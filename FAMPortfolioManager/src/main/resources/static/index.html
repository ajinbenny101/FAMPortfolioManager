<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Manager</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <h1>Portfolio Manager</h1>
      <nav>
        <button class="nav-item active" onclick="goToPage('index.html')">Dashboard</button>
        <button class="nav-item" onclick="goToPage('holdings.html')">Holdings</button>
        <button class="nav-item" onclick="goToPage('performance.html')">Performance</button>
      </nav>
    </aside>

    <main class="content">

      <!-- ═══════════════════════════════════════════════════════════
           AI ALERT BANNER
           Sits above the topbar. Populated entirely by alerts.js.
           Hidden by default; shown once alerts are evaluated.
      ════════════════════════════════════════════════════════════ -->
      <div id="alertBanner" class="alert-banner alert-banner--hidden" role="alert" aria-live="polite">

        <!-- Left: icon + message cycling area -->
        <div class="alert-banner__left">
          <span class="alert-banner__icon" id="alertIcon">⚡</span>
          <div class="alert-banner__text-wrap">
            <span class="alert-banner__label" id="alertLabel">Portfolio Alert</span>
            <span class="alert-banner__message" id="alertMessage">Analysing your portfolio…</span>
          </div>
        </div>

        <!-- Centre: navigation dots when there are multiple alerts -->
        <div class="alert-banner__dots" id="alertDots"></div>

        <!-- Right: prev / next arrows + dismiss -->
        <div class="alert-banner__actions">
          <button class="alert-banner__nav" id="alertPrev" aria-label="Previous alert">&#8249;</button>
          <span class="alert-banner__counter" id="alertCounter"></span>
          <button class="alert-banner__nav" id="alertNext" aria-label="Next alert">&#8250;</button>
          <button class="alert-banner__dismiss" id="alertDismiss" aria-label="Dismiss alerts">&#10005;</button>
        </div>
      </div>
      <!-- END AI ALERT BANNER -->

      <header class="topbar">
        <div>
          <label for="portfolioSelect">Portfolio</label>
          <select id="portfolioSelect"></select>
          <div class="toolbar-row">
            <button id="overallViewBtn" type="button" class="view-toggle active">Overall Performance</button>
            <button id="individualViewBtn" type="button" class="view-toggle">Individual Portfolio</button>
          </div>
        </div>
        <div class="stats-inline">
          <div>
            <span>Total Value</span>
            <strong id="totalValue">$0.00</strong>
          </div>
          <div>
            <span>Total Return</span>
            <strong id="totalReturn">0.00%</strong>
          </div>
        </div>
      </header>

      <section class="chart-grid">
        <article class="card">
          <h2 id="chartTitle">Overall Performance</h2>
          <div class="chart-canvas-wrap">
            <canvas id="performanceChart"></canvas>
          </div>
        </article>
        <article class="card">
          <h2>Performance Trend</h2>
          <div class="chart-canvas-wrap">
            <canvas id="trendChart"></canvas>
          </div>
        </article>
      </section>

      <section class="card" id="portfolioSummary" style="display:none;">
        <h2>Individual Portfolio</h2>
        <div class="portfolio-summary">
          <div class="summary-item">
            <span>Portfolio Name</span>
            <strong id="portfolioName">-</strong>
          </div>
          <div class="summary-item">
            <span>Total Portfolio Value</span>
            <strong id="portfolioValue">$0.00</strong>
          </div>
          <div class="summary-item">
            <span>Total Profit / Loss</span>
            <strong id="portfolioProfitLoss">$0.00</strong>
          </div>
          <div class="summary-item">
            <span>Total Return</span>
            <strong id="portfolioReturn">0.00%</strong>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    function goToPage(page) {
      window.location.href = page;
    }
  </script>
  <script src="app.js"></script>
  <script src="alerts.js"></script>
</body>
</html>
